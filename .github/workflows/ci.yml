name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-action@stable
      - run: cargo check || true
      - run: cargo test || true
      - run: cargo clippy --all-targets --all-features || true
      - run: cargo fmt --check || true
