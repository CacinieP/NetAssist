name: Release

# Manual release builder for all platforms.
#
# Triggered ONLY via workflow_dispatch (the GitHub Actions "Run workflow"
# button) — it deliberately does NOT listen on `push: tags`. The previous
# auto-publish-on-tag workflow burned Actions minutes on every tag push and
# got the prior account suspended; keeping releases opt-in avoids that.
#
# If no `tag` is supplied, it defaults to `v<version>` read from package.json.
# The release is created/updated from the resulting tag (the tag is NOT
# pushed by this workflow; it creates a GitHub Release which auto-creates the
# tag if missing).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.3.2). Leave empty to use v<package.json version>."
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
            bundles: dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
            bundles: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            bundles: msi nsis
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            bundles: deb appimage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libpcap-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # Apple code-signing is optional: only when the APPLE_CERTIFICATE
      # secret is configured. Without it the build is ad-hoc / unsigned,
      # which matches the current tauri.conf.json (no signingIdentity).
      - name: Import Apple Certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE secret not set — building unsigned/ad-hoc."
            exit 0
          fi
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Build Tauri app
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetAssist-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "value=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          # Move every installable into ./release/ so the release step can
          # glob them with a single pattern, regardless of which artifact
          # zip they came from.
          mkdir -p release
          find artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.deb' -o \
            -name '*.AppImage' \
          \) -exec cp {} release/ \;
          echo "=== release assets ===" && ls -la release/

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
